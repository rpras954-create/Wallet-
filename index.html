<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wallet per</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #FFF5F7;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .text-gradient {
            background: linear-gradient(to r, #F472B6, #FB7185, #DB2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-main-gradient {
            background: linear-gradient(to right, #F9A8D4, #FDA4AF, #F9A8D4);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen bg-fixed bg-cover bg-center" style="background-image: url('https://i.postimg.cc/YSRkYPbp/99a3645238bd3747f4cdddebb4c4bd03.jpg');">

    <!-- Floating Emojis Background -->
    <div id="floating-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <!-- Emojis will be injected by JS -->
    </div>

    <div class="relative z-10 w-full max-w-md mx-auto pt-8 px-4 pb-12">
        
        <!-- Header / Profile Section -->
        <div class="relative bg-white/80 backdrop-blur-sm rounded-[2rem] shadow-xl overflow-hidden mb-8 border-b-4 border-pink-200 transition-all hover:shadow-2xl">
            <div class="h-28 bg-cover bg-center" style="background-image: url('https://i.postimg.cc/W1R2vghm/b192d7b93f431e5cc79a02177619e562.jpg');"></div>
            <div class="flex flex-col items-center -mt-14 pb-6 relative z-10">
                <div class="w-28 h-28 rounded-full border-4 border-white shadow-lg overflow-hidden bg-gray-100">
                    <img src="https://i.postimg.cc/P5DBz7fB/adf96e0577f19beb7aaacfaa40dfdeb5.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
                <h1 class="mt-3 text-2xl font-extrabold text-gradient">wallet per</h1>
                <p class="text-sm text-gray-400">บันทึกรายรับ-รายจ่ายของเป้อ 🎀🐏</p>
            </div>
        </div>

        <!-- Balance Grid (Badges Area) -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-3xl shadow-sm border border-pink-100 text-center transition-transform hover:scale-105">
                <i data-lucide="building-2" class="mx-auto mb-2 text-pink-400"></i>
                <p class="text-xs font-bold text-gray-400">ธนาคาร</p>
                <p id="display-bank" class="text-base font-black text-gray-600">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-3xl shadow-sm border border-pink-100 text-center transition-transform hover:scale-105">
                <i data-lucide="wallet" class="mx-auto mb-2 text-pink-500"></i>
                <p class="text-xs font-bold text-gray-400">ทรูมันนี่</p>
                <p id="display-wallet" class="text-base font-black text-gray-600">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-3xl shadow-sm border border-pink-100 text-center transition-transform hover:scale-105">
                <i data-lucide="piggy-bank" class="mx-auto mb-2 text-pink-600"></i>
                <p class="text-xs font-bold text-gray-400">เงินเก็บ</p>
                <p id="display-savings" class="text-base font-black text-gray-600">0</p>
            </div>
        </div>

        <!-- Total Summary (Status Bar) -->
        <div class="bg-white/90 backdrop-blur-sm p-5 rounded-[2rem] shadow-md border-l-8 border-pink-500 mb-6 flex justify-between items-center">
            <span class="font-bold text-lg flex items-center gap-2 text-gray-600">
                <i data-lucide="sparkles" class="text-pink-400 w-5 h-5"></i> รวมยอดเงินทั้งหมด
            </span>
            <div class="flex flex-col items-end">
                <span id="display-total" class="text-3xl font-black text-gradient">฿0</span>
            </div>
        </div>

        <!-- Transaction Control Area -->
        <div class="bg-white/95 backdrop-blur-sm p-6 rounded-[2.5rem] shadow-lg border border-pink-100 mb-8">
            <label class="block text-sm font-bold mb-3 uppercase tracking-wider text-center text-pink-500">เลือกบัญชีที่ต้องการจัดการ 🎀</label>
            
            <!-- Category Selector (Badges) -->
            <div class="flex gap-2 mb-6 p-1 bg-pink-50 rounded-full">
                <button onclick="setCategory('bank')" id="btn-bank" class="flex-1 py-3 text-sm rounded-full font-bold transition-all duration-300 bg-gradient-to-r from-pink-400 to-rose-300 text-white shadow-md transform scale-105">ธนาคาร</button>
                <button onclick="setCategory('wallet')" id="btn-wallet" class="flex-1 py-3 text-sm rounded-full font-bold transition-all duration-300 text-pink-300 hover:bg-white/50">ทรูมันนี่</button>
                <button onclick="setCategory('savings')" id="btn-savings" class="flex-1 py-3 text-sm rounded-full font-bold transition-all duration-300 text-pink-300 hover:bg-white/50">เงินเก็บ</button>
            </div>

            <div class="relative mb-6">
                <input id="amount-input" type="number" placeholder="0.00" class="w-full text-4xl font-black text-center py-5 bg-pink-50/50 rounded-3xl border-2 border-transparent focus:border-pink-300 outline-none transition-all placeholder-pink-200 text-gray-600">
                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-pink-300 font-black text-2xl">฿</span>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="handleTransaction('deposit')" class="flex items-center justify-center gap-2 py-4 rounded-full text-white font-bold shadow-lg active:scale-95 transition-transform bg-gradient-to-r from-pink-400 to-rose-400">
                    <i data-lucide="plus"></i> รายรับ 🎀
                </button>
                <button onclick="handleTransaction('withdraw')" class="flex items-center justify-center gap-2 py-4 rounded-full text-white font-bold shadow-lg active:scale-95 transition-transform bg-gradient-to-r from-rose-300 to-pink-300">
                    <i data-lucide="minus"></i> รายจ่าย 💭
                </button>
            </div>
            
            <div class="space-y-3">
                <button onclick="resetCategory()" class="w-full flex items-center justify-center gap-2 py-3 rounded-full font-bold border-2 transition-colors active:bg-pink-50 text-pink-400 border-pink-100 hover:bg-pink-50">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> ล้างข้อมูลบัญชีนี้ 🐏
                </button>
                <button onclick="resetAll()" class="w-full flex items-center justify-center gap-2 py-3 rounded-full font-bold text-white shadow-md transition-all active:scale-95 hover:opacity-90 bg-gradient-to-r from-pink-400 via-rose-400 to-pink-500">
                    <i data-lucide="refresh-ccw" class="w-4 h-4"></i> รีเซ็ตยอดเงินทั้งหมด ✨
                </button>
            </div>
        </div>

        <!-- Notes Section -->
        <div class="mb-5 flex items-center justify-between">
            <h2 class="font-bold flex items-center gap-2 text-xl text-gradient">
                <i data-lucide="receipt-text" class="text-pink-500"></i> บันทึกช่วยจำ 🎀
            </h2>
        </div>

        <div class="bg-white/90 backdrop-blur-sm p-5 rounded-[2.5rem] shadow-lg border border-pink-100 mb-8">
            <textarea id="note-input" placeholder="เขียนโน๊ตของคุณที่นี่... 💭" class="w-full h-28 p-4 bg-pink-50/20 rounded-2xl border-none focus:ring-2 focus:ring-pink-200 outline-none resize-none mb-4 text-sm placeholder-pink-200 text-gray-600"></textarea>
            
            <div class="flex items-center justify-between">
                <div class="flex gap-2">
                    <!-- Check Queue Dotted Button (Image Upload) -->
                    <label class="cursor-pointer p-3 rounded-full bg-pink-100 text-pink-600 hover:bg-pink-200 transition-colors relative shadow-sm border-dashed border-2 border-pink-300">
                        <i data-lucide="image"></i>
                        <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="previewImage(event)">
                        <div id="image-status" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-pink-400 rounded-full border-2 border-white"></div>
                    </label>
                </div>
                <button onclick="addNote()" class="px-8 py-3 rounded-full font-bold text-white shadow-md active:scale-95 transition-transform flex items-center gap-2 bg-gradient-to-r from-pink-400 to-rose-400">
                    <i data-lucide="plus" class="w-5 h-5"></i> เพิ่มโน๊ต ✨
                </button>
            </div>
        </div>

        <!-- Notes List -->
        <div id="notes-list" class="space-y-5">
            <!-- Notes will be injected here -->
            <div class="text-center py-12 text-pink-300 italic text-base font-medium">ไม่มีรายการบันทึกในขณะนี้ 🐏</div>
        </div>
    </div>

    <script>
        // State Management
        let balances = { bank: 0, wallet: 0, savings: 0 };
        let category = 'bank';
        let notes = [];
        let selectedImage = null;

        // Initialize Lucide Icons
        lucide.createIcons();

        // Floating Emojis Logic
        const emojis = ['🎀', '🐏', '✨', '💭', '🎀', '✨'];
        const container = document.getElementById('floating-container');
        
        emojis.forEach((char, i) => {
            const div = document.createElement('div');
            div.className = 'absolute animate-float opacity-40 select-none';
            div.innerText = char;
            div.style.fontSize = (20 + Math.random() * 10) + 'px';
            div.style.top = (Math.random() * 80 + 5) + '%';
            div.style.left = (Math.random() * 90) + '%';
            div.style.animationDelay = (i * 0.5) + 's';
            container.appendChild(div);
        });

        // Functions
        function updateUI() {
            document.getElementById('display-bank').innerText = balances.bank.toLocaleString();
            document.getElementById('display-wallet').innerText = balances.wallet.toLocaleString();
            document.getElementById('display-savings').innerText = balances.savings.toLocaleString();
            
            const total = balances.bank + balances.wallet + balances.savings;
            document.getElementById('display-total').innerText = '฿' + total.toLocaleString();

            // Update Buttons State
            ['bank', 'wallet', 'savings'].forEach(cat => {
                const btn = document.getElementById('btn-' + cat);
                if (cat === category) {
                    btn.className = "flex-1 py-3 text-sm rounded-full font-bold transition-all duration-300 bg-gradient-to-r from-pink-400 to-rose-300 text-white shadow-md transform scale-105";
                } else {
                    btn.className = "flex-1 py-3 text-sm rounded-full font-bold transition-all duration-300 text-pink-300 hover:bg-white/50";
                }
            });
        }

        function setCategory(cat) {
            category = cat;
            updateUI();
        }

        function handleTransaction(type) {
            const input = document.getElementById('amount-input');
            const val = parseFloat(input.value);
            if (isNaN(val) || val <= 0) return;

            if (type === 'deposit') {
                balances[category] += val;
            } else {
                balances[category] = Math.max(0, balances[category] - val);
            }

            input.value = '';
            updateUI();
        }

        function resetCategory() {
            balances[category] = 0;
            updateUI();
        }

        function resetAll() {
            balances = { bank: 0, wallet: 0, savings: 0 };
            updateUI();
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImage = e.target.result;
                    document.getElementById('image-status').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function addNote() {
            const input = document.getElementById('note-input');
            const text = input.value.trim();
            if (!text && !selectedImage) return;

            const note = {
                id: Date.now(),
                text: text,
                image: selectedImage,
                date: new Date().toLocaleString('th-TH')
            };

            notes.unshift(note);
            input.value = '';
            selectedImage = null;
            document.getElementById('image-status').classList.add('hidden');
            document.getElementById('image-upload').value = '';
            renderNotes();
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            if (notes.length === 0) {
                list.innerHTML = '<div class="text-center py-12 text-pink-300 italic text-base font-medium">ไม่มีรายการบันทึกในขณะนี้ 🐏</div>';
                return;
            }

            list.innerHTML = notes.map(note => `
                <div class="bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-md border border-pink-100 overflow-hidden hover:shadow-lg transition-shadow">
                    ${note.image ? `<div class="h-56 overflow-hidden"><img src="${note.image}" class="w-full h-full object-cover"></div>` : ''}
                    <div class="p-5">
                        <p class="text-base whitespace-pre-wrap mb-4 text-gray-600">${note.text}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-pink-50">
                            <span class="text-xs font-medium text-gray-400 uppercase">${note.date} 🎀</span>
                            <button onclick="deleteNote(${note.id})" class="p-2 text-pink-300 hover:text-pink-500 transition-colors bg-pink-50 rounded-full">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Initial UI Update
        updateUI();
    </script>
</body>
</html>
