<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wallet per 🎀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-image: url('https://i.postimg.cc/YSRkYPbp/99a3645238bd3747f4cdddebb4c4bd03.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .dotted-border {
            border: 2px dashed #F472B6;
        }
        .text-gradient {
            background: linear-gradient(to right, #db2777, #f472b6, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pink-gradient {
            background: linear-gradient(to right, #f472b6, #fb7185);
        }
        /* แก้ไขระยะห่างรหัสผ่านตามรูปภาพ */
        .password-input {
            letter-spacing: 0.3em;
            text-align: center;
        }
        .password-input::placeholder {
            letter-spacing: normal;
        }
    </style>
</head>
<body class="min-h-screen pb-10 relative overflow-x-hidden">

    <!-- Floating Emojis Background -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-40">
        <div class="absolute animate-float" style="top: 10%; left: 5%; font-size: 24px;">🎀</div>
        <div class="absolute animate-float" style="top: 25%; right: 8%; animation-delay: 1s; font-size: 20px;">✨</div>
        <div class="absolute animate-float" style="bottom: 15%; left: 10%; animation-delay: 2s; font-size: 22px;">🐏</div>
        <div class="absolute animate-float" style="bottom: 30%; right: 5%; animation-delay: 1.5s; font-size: 26px;">💭</div>
        <div class="absolute animate-float" style="top: 50%; left: 3%; animation-delay: 0.5s; font-size: 18px;">🎀</div>
        <div class="absolute animate-float" style="top: 5%; right: 15%; animation-delay: 2.5s; font-size: 20px;">✨</div>
    </div>

    <div class="relative z-10 w-full max-w-md mx-auto pt-4 px-4">
        
        <!-- SECTION: Badges -->
        <div class="flex justify-center gap-2 mb-4">
            <div class="w-3 h-3 rounded-full bg-pink-400 shadow-sm animate-pulse"></div>
            <div class="w-3 h-3 rounded-full bg-rose-300 shadow-sm"></div>
            <div class="w-3 h-3 rounded-full bg-pink-200 shadow-sm"></div>
        </div>

        <!-- SECTION: Status Bar -->
        <div class="bg-white/80 backdrop-blur-md rounded-full px-4 py-2 mb-6 flex items-center justify-between border border-pink-100 shadow-sm">
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full">STATUS</span>
                <span id="status-text" class="text-xs text-pink-800 font-medium">โหมดดูอย่างเดียว ✨</span>
            </div>
            <button id="auth-btn" onclick="toggleAuth()" class="text-[10px] font-bold text-pink-500 flex items-center gap-1">
                <i data-lucide="unlock" size="10"></i> เข้าสู่ระบบแก้ไข
            </button>
        </div>

        <!-- SECTION: Header Profile -->
        <div class="relative bg-white/80 backdrop-blur-sm rounded-[2rem] shadow-xl overflow-hidden mb-8 border-b-4 border-pink-200">
            <div class="h-28 bg-cover bg-center" style="background-image: url('https://i.postimg.cc/W1R2vghm/b192d7b93f431e5cc79a02177619e562.jpg');"></div>
            <div class="flex flex-col items-center -mt-14 pb-6 relative z-10">
                <div class="w-28 h-28 rounded-full border-4 border-white shadow-lg overflow-hidden bg-gray-100">
                    <img src="https://i.postimg.cc/P5DBz7fB/adf96e0577f19beb7aaacfaa40dfdeb5.jpg" alt="Profile" class="w-full h-full object-cover">
                </div>
                <h1 class="mt-3 text-2xl font-extrabold text-gradient">wallet per</h1>
                <p class="text-sm opacity-70 font-medium text-pink-600">บันทึกรายรับ-รายจ่าย 🎀🐏✨️💭</p>
            </div>
        </div>

        <!-- SECTION: Dotted Button -->
        <button class="w-full dotted-border rounded-2xl py-3 mb-6 bg-white/40 text-pink-500 font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
            <i data-lucide="sparkles" size="16"></i> บันทึกความสุขในทุกๆ วัน ✨
        </button>

        <!-- Balance Grid -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-3xl shadow-sm border text-center border-pink-100">
                <i data-lucide="building-2" class="mx-auto mb-2 text-pink-400"></i>
                <p class="text-[10px] font-bold text-pink-600">ธนาคาร</p>
                <p id="bal-bank" class="text-base font-black truncate text-pink-900">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-3xl shadow-sm border text-center border-pink-100">
                <i data-lucide="wallet" class="mx-auto mb-2 text-rose-400"></i>
                <p class="text-[10px] font-bold text-pink-600">ทรูมันนี่</p>
                <p id="bal-wallet" class="text-base font-black truncate text-pink-900">0</p>
            </div>
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-3xl shadow-sm border text-center border-pink-100">
                <i data-lucide="piggy-bank" class="mx-auto mb-2 text-pink-500"></i>
                <p class="text-[10px] font-bold text-pink-600">เงินเก็บ</p>
                <p id="bal-savings" class="text-base font-black truncate text-pink-900">0</p>
            </div>
        </div>

        <!-- Total Summary -->
        <div class="bg-white/90 backdrop-blur-sm p-5 rounded-[2rem] shadow-md border-l-8 mb-6 flex justify-between items-center border-pink-500">
            <span class="font-bold text-lg flex items-center gap-2 text-pink-900">
                <i data-lucide="sparkles" size="18" class="text-pink-400"></i> รวมยอดเงินทั้งหมด
            </span>
            <div class="flex flex-col items-end">
                <span id="bal-total" class="text-3xl font-black text-gradient">฿0</span>
            </div>
        </div>

        <!-- Transaction Area -->
        <div id="edit-panel" class="bg-white/95 backdrop-blur-sm p-6 rounded-[2.5rem] shadow-lg border mb-8 border-pink-100">
            <!-- Content will be switched between Locked and Unlocked via JS -->
            <div id="locked-view" class="py-10 text-center space-y-4">
                <div class="w-16 h-16 bg-pink-50 rounded-full flex items-center justify-center mx-auto text-pink-300">
                    <i data-lucide="eye" size="32"></i>
                </div>
                <p class="text-sm font-bold text-pink-400">โหมดดูอย่างเดียว (Read-only) 🎀</p>
                <button onclick="openAuthModal()" class="px-6 py-2 bg-pink-500 text-white rounded-full text-xs font-bold shadow-md active:scale-95 transition-transform">เข้าสู่ระบบเพื่อแก้ไข</button>
            </div>

            <div id="unlocked-view" class="hidden">
                <label class="block text-sm font-bold mb-3 uppercase tracking-wider text-center text-pink-500">เลือกบัญชีที่ต้องการจัดการ 🐏</label>
                <div class="flex gap-2 mb-6 p-1 bg-pink-50/50 rounded-full">
                    <button onclick="setCategory('bank')" id="btn-cat-bank" class="flex-1 py-3 text-sm rounded-full font-bold transition-all bg-pink-500 text-white shadow-md">ธนาคาร</button>
                    <button onclick="setCategory('wallet')" id="btn-cat-wallet" class="flex-1 py-3 text-sm rounded-full font-bold transition-all text-pink-300">ทรูมันนี่</button>
                    <button onclick="setCategory('savings')" id="btn-cat-savings" class="flex-1 py-3 text-sm rounded-full font-bold transition-all text-pink-300">เงินเก็บ</button>
                </div>

                <div class="relative mb-6">
                    <input id="amount-input" type="number" placeholder="0.00" class="w-full text-4xl font-black text-center py-5 bg-pink-50/30 rounded-3xl border-2 border-transparent focus:border-pink-200 outline-none text-pink-900 placeholder-pink-100">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-pink-200 font-black text-2xl">฿</span>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="handleTransaction('deposit')" class="flex items-center justify-center gap-2 py-4 rounded-full text-white font-bold shadow-lg active:scale-95 transition-transform bg-gradient-to-r from-pink-500 to-rose-400">
                        <i data-lucide="plus" size="22"></i> ฝากเงิน
                    </button>
                    <button onclick="handleTransaction('withdraw')" class="flex items-center justify-center gap-2 py-4 rounded-full text-white font-bold shadow-lg active:scale-95 transition-transform bg-gradient-to-r from-rose-400 to-pink-300">
                        <i data-lucide="minus" size="22"></i> ถอนเงิน
                    </button>
                </div>
                
                <div class="space-y-3">
                    <button onclick="resetCategory()" class="w-full flex items-center justify-center gap-2 py-3 rounded-full font-bold border-2 text-rose-400 border-rose-100 hover:bg-rose-50 transition-colors">
                        <i data-lucide="rotate-ccw" size="18"></i> รีเซ็ตเฉพาะบัญชีนี้
                    </button>
                    <button onclick="resetAllBalances()" class="w-full flex items-center justify-center gap-2 py-3 rounded-full font-bold text-white shadow-md active:scale-95 bg-gradient-to-r from-pink-400 via-rose-400 to-pink-500">
                        <i data-lucide="refresh-ccw" size="18"></i> รีเซ็ตยอดเงินทุกบัญชีเป็น 0
                    </button>
                </div>
            </div>
        </div>

        <!-- Notes Section -->
        <div class="mb-5 flex items-center justify-between">
            <h2 class="font-bold flex items-center gap-2 text-xl text-gradient">
                <i data-lucide="receipt-text" size="24" class="text-pink-500"></i> บันทึกช่วยจำ 💭
            </h2>
        </div>

        <div id="note-input-area" class="hidden bg-white/90 backdrop-blur-sm p-5 rounded-[2.5rem] shadow-lg border mb-8 border-pink-100">
            <textarea id="note-text" placeholder="เขียนโน๊ตของคุณที่นี่..." class="w-full h-28 p-4 bg-pink-50/20 rounded-2xl border-none focus:ring-2 focus:ring-pink-100 outline-none resize-none mb-4 text-sm text-pink-900 placeholder-pink-200"></textarea>
            
            <div class="flex items-center justify-between">
                <label class="cursor-pointer p-3 rounded-full bg-pink-100 text-pink-600 hover:bg-pink-200 transition-colors relative shadow-sm">
                    <i data-lucide="image" size="22"></i>
                    <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="previewImage()">
                    <div id="image-indicator" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-rose-400 rounded-full border-2 border-white"></div>
                </label>
                <button onclick="addNote()" class="px-8 py-3 rounded-full font-bold text-white shadow-md active:scale-95 flex items-center gap-2 pink-gradient">
                    <i data-lucide="plus" size="20"></i> เพิ่มโน๊ต
                </button>
            </div>
        </div>

        <!-- Notes List -->
        <div id="notes-container" class="space-y-5">
            <!-- Notes will be injected here -->
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 z-[100] bg-pink-900/40 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xs p-8 shadow-2xl scale-in">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4 text-pink-500">
                    <i data-lucide="lock" size="32"></i>
                </div>
                <h3 class="text-xl font-black text-pink-900">ยืนยันตัวตน 🎀</h3>
                <p class="text-xs text-pink-400 mt-1">ใส่รหัสเพื่อปลดล็อคการแก้ไข</p>
            </div>
            <input type="password" id="password-input" placeholder="รหัสผ่าน" class="w-full py-4 bg-pink-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none mb-6 text-2xl password-input" maxlength="4">
            <div class="flex gap-3">
                <button onclick="closeAuthModal()" class="flex-1 py-3 text-pink-400 font-bold text-sm">ยกเลิก</button>
                <button onclick="handleLogin()" class="flex-1 py-3 bg-pink-500 text-white rounded-2xl font-bold text-sm shadow-lg shadow-pink-200">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        // Initial State
        let balances = JSON.parse(localStorage.getItem('wp_balances')) || { bank: 0, wallet: 0, savings: 0 };
        let notes = JSON.parse(localStorage.getItem('wp_notes')) || [];
        let isAuthenticated = false;
        let currentCategory = 'bank';
        let selectedImageBase64 = null;

        // Initialize Lucide icons
        lucide.createIcons();

        // Update UI
        function updateUI() {
            document.getElementById('bal-bank').innerText = balances.bank.toLocaleString();
            document.getElementById('bal-wallet').innerText = balances.wallet.toLocaleString();
            document.getElementById('bal-savings').innerText = balances.savings.toLocaleString();
            
            const total = balances.bank + balances.wallet + balances.savings;
            document.getElementById('bal-total').innerText = '฿' + total.toLocaleString();

            // Authentication Views
            if (isAuthenticated) {
                document.getElementById('locked-view').classList.add('hidden');
                document.getElementById('unlocked-view').classList.remove('hidden');
                document.getElementById('note-input-area').classList.remove('hidden');
                document.getElementById('status-text').innerText = 'โหมดแก้ไข 🎀';
                document.getElementById('auth-btn').innerHTML = '<i data-lucide="lock" size="10"></i> ออกจากระบบ';
            } else {
                document.getElementById('locked-view').classList.remove('hidden');
                document.getElementById('unlocked-view').classList.add('hidden');
                document.getElementById('note-input-area').classList.add('hidden');
                document.getElementById('status-text').innerText = 'โหมดดูอย่างเดียว ✨';
                document.getElementById('auth-btn').innerHTML = '<i data-lucide="unlock" size="10"></i> เข้าสู่ระบบแก้ไข';
            }
            
            renderNotes();
            lucide.createIcons();
            localStorage.setItem('wp_balances', JSON.stringify(balances));
            localStorage.setItem('wp_notes', JSON.stringify(notes));
        }

        // Auth Logic
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('password-input').value = ''; }
        function toggleAuth() { if (isAuthenticated) { isAuthenticated = false; updateUI(); } else { openAuthModal(); } }

        function handleLogin() {
            const pass = document.getElementById('password-input').value;
            if (pass === '1234') {
                isAuthenticated = true;
                closeAuthModal();
                updateUI();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง 🎀');
                document.getElementById('password-input').value = '';
            }
        }

        // Transaction Logic
        function setCategory(cat) {
            currentCategory = cat;
            ['bank', 'wallet', 'savings'].forEach(c => {
                const btn = document.getElementById(`btn-cat-${c}`);
                if (c === cat) {
                    btn.className = 'flex-1 py-3 text-sm rounded-full font-bold transition-all bg-pink-500 text-white shadow-md';
                } else {
                    btn.className = 'flex-1 py-3 text-sm rounded-full font-bold transition-all text-pink-300';
                }
            });
        }

        function handleTransaction(type) {
            const amount = parseFloat(document.getElementById('amount-input').value);
            if (isNaN(amount) || amount <= 0) return;

            if (type === 'deposit') {
                balances[currentCategory] += amount;
            } else {
                balances[currentCategory] = Math.max(0, balances[currentCategory] - amount);
            }
            document.getElementById('amount-input').value = '';
            updateUI();
        }

        function resetCategory() { balances[currentCategory] = 0; updateUI(); }
        function resetAllBalances() { balances = { bank: 0, wallet: 0, savings: 0 }; updateUI(); }

        // Note Logic
        function previewImage() {
            const file = document.getElementById('image-upload').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    selectedImageBase64 = reader.result;
                    document.getElementById('image-indicator').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function addNote() {
            const text = document.getElementById('note-text').value;
            if (!text.trim() && !selectedImageBase64) return;

            const newNote = {
                id: Date.now(),
                text: text,
                image: selectedImageBase64,
                date: new Date().toLocaleString('th-TH')
            };
            notes.unshift(newNote);
            document.getElementById('note-text').value = '';
            document.getElementById('image-upload').value = '';
            document.getElementById('image-indicator').classList.add('hidden');
            selectedImageBase64 = null;
            updateUI();
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            updateUI();
        }

        function renderNotes() {
            const container = document.getElementById('notes-container');
            if (notes.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-pink-300 italic text-base font-medium">โน๊ตตรงนี้เลยน้า 🎀</div>';
                return;
            }

            container.innerHTML = notes.map(note => `
                <div class="bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-md border overflow-hidden border-pink-100">
                    ${note.image ? `<div class="h-56 overflow-hidden"><img src="${note.image}" class="w-full h-full object-cover"></div>` : ''}
                    <div class="p-5">
                        <p class="text-base whitespace-pre-wrap mb-4 text-pink-900">${note.text}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-pink-50">
                            <span class="text-[10px] font-medium text-pink-400 uppercase">${note.date}</span>
                            ${isAuthenticated ? `
                                <button onclick="deleteNote(${note.id})" class="p-2 text-rose-300 hover:text-rose-500 transition-colors bg-rose-50 rounded-full">
                                    <i data-lucide="trash-2" size="18"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initial render
        updateUI();
    </script>
</body>
                </html>
